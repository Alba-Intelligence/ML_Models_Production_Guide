name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Sync dependencies
        run: uv sync

      - name: Generate Docker artifacts
        run: |
          if command -v nix >/dev/null 2>&1; then
            python scripts/generate-docker-artifacts.py
          fi

      - name: Export nbdev modules
        run: uv run nbdev-export --path nbs/

      - name: Render docs
        run: quarto render . --no-execute

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -q
