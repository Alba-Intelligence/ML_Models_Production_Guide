# docker-compose.local-infra.yml
# Local emulation: compute-plane infrastructure
# Emulates AWS APIs (LocalStack), Kubernetes (K3s), and Slurm scheduling.
# Pair with docker-compose.dev.yml (data plane: MLflow, PostgreSQL, MinIO).
#
# Usage:
#   docker compose -f docker-compose.dev.yml -f docker-compose.local-infra.yml up
#   or separately:
#   docker compose -f docker-compose.local-infra.yml up
#
# DeploymentProfile: local_emulation

services:

  # ── AWS API emulation (LocalStack Community) ───────────────────────────────
  localstack:
    image: localstack/localstack:3
    container_name: ml_deploy_localstack
    ports:
      - "4566:4566"         # unified API gateway
    environment:
      - SERVICES=s3,iam,ec2,sts,secretsmanager,cloudwatch,logs
      - DEBUG=0
      - DATA_DIR=/var/lib/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_HOST=localstack:4566
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ml_local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Kubernetes in Docker (K3s) ─────────────────────────────────────────────
  k3s:
    image: rancher/k3s:v1.29.4-k3s1
    container_name: ml_deploy_k3s
    privileged: true
    command: server --disable traefik --disable metrics-server
    ports:
      - "6443:6443"         # Kubernetes API
      - "8080:8080"
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666
    volumes:
      - k3s_data:/var/lib/rancher/k3s
      - k3s_output:/output
    networks:
      - ml_local
    healthcheck:
      test: ["CMD", "k3s", "kubectl", "get", "nodes"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── Slurm cluster (controller + worker) ───────────────────────────────────
  slurmctld:
    image: nathanhess/slurm:latest
    container_name: ml_deploy_slurmctld
    hostname: slurmctld
    command: ["slurm_controller"]
    ports:
      - "6817:6817"         # slurmctld port
    volumes:
      - slurm_shared:/shared
      - slurm_state:/var/spool/slurmctld
    networks:
      ml_local:
        aliases:
          - slurmctld
    healthcheck:
      test: ["CMD", "scontrol", "ping"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  slurmd:
    image: nathanhess/slurm:latest
    container_name: ml_deploy_slurmd
    hostname: slurmd
    command: ["slurm_worker"]
    depends_on:
      slurmctld:
        condition: service_healthy
    volumes:
      - slurm_shared:/shared
    networks:
      ml_local:
        aliases:
          - slurmd
    environment:
      - SLURM_CONTROLLER_HOST=slurmctld

  # ── LocalStack bootstrap (create S3 buckets, IAM roles) ───────────────────
  localstack_init:
    image: amazon/aws-cli:2.15.56
    container_name: ml_deploy_localstack_init
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - ml_local
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Initialising LocalStack buckets and roles..."
        aws s3 mb s3://mlflow-artifacts --endpoint-url=http://localstack:4566 || true
        aws s3 mb s3://model-registry   --endpoint-url=http://localstack:4566 || true
        aws iam create-role \
          --role-name ml-deploy-local \
          --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ec2.amazonaws.com"},"Action":"sts:AssumeRole"}]}' \
          --endpoint-url=http://localstack:4566 || true
        echo "LocalStack init complete."

volumes:
  localstack_data:
  k3s_data:
  k3s_output:
  slurm_shared:
  slurm_state:

networks:
  ml_local:
    name: ml_local
    driver: bridge
