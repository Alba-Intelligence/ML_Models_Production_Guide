services:
  traefik:
    image: traefik:v3.1.1
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - ml_local
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ml_local"
    labels:
      traefik.enable: "true"
      traefik.http.routers.dashboard.rule: "PathPrefix(`/dashboard`) || PathPrefix(`/api`)"
      traefik.http.routers.dashboard.service: "api@internal"

  dev:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    command: bash -lc "uv sync --frozen && bash"
    volumes:
      - ./:/workspace
    networks:
      - ml_local
    environment:
      MLFLOW_TRACKING_URI: http://traefik/mlflow
      MLFLOW_BACKEND_STORE_URI: postgresql://mlflow:mlflow@postgres:5432/mlflow
      MLFLOW_ARTIFACTS_DESTINATION: s3://mlflow
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://floci:4566
    depends_on:
      traefik:
        condition: service_started
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    stdin_open: true
    tty: true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    ports:
      - "5432:5432"
    networks:
      - ml_local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 20

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ml_local
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://mlflow:mlflow@postgres:5432/mlflow
      - --artifacts-destination
      - s3://mlflow
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      MLFLOW_S3_ENDPOINT_URL: http://floci:4566
    labels:
      traefik.enable: "true"
      traefik.http.routers.mlflow.rule: "PathPrefix(`/mlflow`)"
      traefik.http.routers.mlflow.service: "mlflow-service"
      traefik.http.services.mlflow-service.loadbalancer.server.port: "5000"

networks:
  ml_local:
    name: ml_local
    driver: bridge
